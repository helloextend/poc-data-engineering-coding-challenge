version: 2

models:
  # stg_orders — partially documented (the ambiguous ones are deliberately bare)
  - name: stg_orders
    description: One row per order. Sourced from raw.orders.
    columns:
      - name: order_id
        description: Primary key. Stable across edits.
        tests:
          - unique
          - not_null
      - name: merchant_id
        description: FK to lkp_merchants.merchant_id.
      - name: order_status
        # No description on purpose — undocumented enum.
      - name: is_test
        # No description on purpose — NULL/TRUE/FALSE ambiguity.
      - name: ordered_at
        description: When the order was placed (UTC).
      - name: paid_at
        description: When payment was authorized. NULL if order is pending or cancelled.
      # customer_id intentionally omitted from docs

  # stg_line_items — fully documented
  - name: stg_line_items
    description: One row per line item.
    columns:
      - name: line_item_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: order_id
        description: FK to stg_orders.order_id.
        tests:
          - not_null
      - name: product_id
        description: FK to stg_products.product_id.
      - name: quantity
        description: Units ordered for this line.
      - name: unit_price
        description: Price per unit in dollars (decimal). Already converted from cents.
      - name: line_status
        description: One of `pending`, `fulfilled`, `cancelled`, `refunded`.

  # stg_shipments — bare (undocumented)
  - name: stg_shipments

  # stg_shipment_line_items — bare (undocumented)
  - name: stg_shipment_line_items

  - name: stg_refunds
    description: |
      Unified, deduped refund staging. See docs/designs/2026-Q2-refunds-modeling.md §3.3
      for the Shopify ↔ Stripe dedup heuristic.
    columns:
      - name: refund_event_id
        description: Surrogate PK derived from (source, source_refund_id, line_item_id).
        tests:
          - unique
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['shopify', 'stripe', 'internal_pos']
      - name: order_id
        tests:
          - not_null
      - name: refund_amount
        tests:
          - not_null
      - name: refunded_at
        tests:
          - not_null

  - name: stg_refund_tenders
    description: Stripe tender-split sidecar. Joins to stg_refunds on (order_id, refunded_at_minute).
    columns:
      - name: source_refund_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: tender_type
        tests:
          - not_null
      - name: tender_amount
        tests:
          - not_null
